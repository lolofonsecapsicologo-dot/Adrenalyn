<title>Adrenalyn XL 2025-26</title>
<style>
  :root {
    --naranja: #FF6B1A;
    --azul: #1A3A6B;
    --azul-dark: #0F2247;
    --verde: #22C55E;
    --gris: #718096;
    --gris-claro: #EDF2F7;
    --bis-bg: #FFFBEB;
    --checked-bg: #F0FFF4;
    --row-h: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Trebuchet MS', system-ui, sans-serif;
    background: #F0F4F8;
    min-height: 100vh;
    max-width: 520px;
    margin: 0 auto;
    overscroll-behavior: none;
  }
  #header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-dark) 100%);
    padding: 12px 14px 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .logo { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: var(--naranja); }
  .temporada { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.65); letter-spacing: 1px; }
  .progress-wrap { height: 7px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--naranja), #FFD700); border-radius: 4px; transition: width .4s ease; }
  .progress-text { font-size: 11px; color: rgba(255,255,255,.75); text-align: right; }
  #toolbar {
    background: white; border-bottom: 1px solid #E2E8F0;
    padding: 8px 12px; display: flex; gap: 8px; align-items: center;
    position: sticky; top: 88px; z-index: 99;
  }
  .search-wrap { flex: 1; position: relative; }
  #searchInput {
    width: 100%; border: 1.5px solid #CBD5E0; border-radius: 8px;
    padding: 8px 32px 8px 10px; font-size: 14px; background: #F7FAFC;
    outline: none; color: #2D3748;
  }
  #searchInput:focus { border-color: var(--azul); }
  #clearSearch {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; font-size: 14px; color: #A0AEC0; cursor: pointer; display: none;
  }
  #filtroBtn {
    display: flex; align-items: center; gap: 5px;
    background: #EDF2F7; border: 1.5px solid #CBD5E0; border-radius: 8px;
    padding: 7px 10px; font-size: 12px; font-weight: 700; color: var(--azul);
    cursor: pointer; white-space: nowrap; transition: all .2s;
    -webkit-user-select: none; user-select: none;
  }
  #filtroBtn.active { background: var(--naranja); border-color: var(--naranja); color: white; }
  .filtro-dot { width: 8px; height: 8px; border-radius: 50%; background: #CBD5E0; transition: background .2s; }
  #filtroBtn.active .filtro-dot { background: white; }
  #tabs {
    display: flex; overflow-x: auto; gap: 0; background: white;
    border-bottom: 2px solid #E2E8F0; padding: 0 8px;
    position: sticky; top: 140px; z-index: 98; scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: none; border: none; border-bottom: 3px solid transparent;
    padding: 9px 9px; cursor: pointer; font-size: 11px; font-weight: 600;
    color: #718096; white-space: nowrap; transition: all .15s;
    -webkit-user-select: none; user-select: none;
  }
  .tab.active { border-bottom-color: var(--naranja); color: var(--azul); }
  #content { padding-bottom: 90px; }
  .subnav {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 10px 12px; background: #EDF2F7;
    border-bottom: 1px solid #E2E8F0; scrollbar-width: none;
  }
  .subnav::-webkit-scrollbar { display: none; }
  .subnav-btn {
    background: white; border: 1.5px solid #CBD5E0; border-radius: 8px;
    padding: 6px 10px; cursor: pointer; font-size: 10px; font-weight: 600;
    color: #4A5568; white-space: nowrap; display: flex; flex-direction: column;
    align-items: center; gap: 2px; min-width: 68px; transition: all .15s;
    -webkit-user-select: none; user-select: none;
  }
  .subnav-btn.active { background: var(--azul); border-color: var(--azul); color: white; }
  .subnav-btn .btn-count { font-size: 11px; font-weight: 800; }
  .subnav-btn.completo .btn-count { color: var(--verde); }
  .subnav-btn.active.completo .btn-count { color: #86EFAC; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px 8px; background: white; border-bottom: 1px solid #E2E8F0;
    position: sticky; top: 183px; z-index: 97;
  }
  .section-title { font-size: 14px; font-weight: 800; color: var(--azul); }
  .section-count { font-size: 13px; font-weight: 700; color: var(--naranja); }
  .card-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: var(--row-h);
    background: white; border-bottom: 1px solid #EDF2F7;
    cursor: pointer; transition: background .12s; gap: 10px;
    -webkit-user-select: none; user-select: none;
  }
  .card-row:active { background: #EDF2F7; }
  .card-row.checked { background: var(--checked-bg); }
  .card-row.bis { background: var(--bis-bg); border-left: 3px solid var(--naranja); }
  .card-row.bis.checked { background: #F0FFF4; }
  .card-row.hidden { display: none; }
  .card-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .card-num {
    font-size: 10px; font-weight: 700; color: #A0AEC0;
    min-width: 38px; background: #EDF2F7; border-radius: 4px;
    padding: 2px 4px; text-align: center; flex-shrink: 0;
  }
  .card-name {
    font-size: 13px; font-weight: 500; color: #2D3748;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-row.checked .card-name { color: #68D391; text-decoration: line-through; }
  .checkbox {
    width: 26px; height: 26px; border-radius: 6px; border: 2px solid #CBD5E0;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .card-row.checked .checkbox { background: var(--verde); border-color: var(--verde); }
  .checkmark { color: white; font-size: 14px; font-weight: 900; display: none; }
  .card-row.checked .checkmark { display: block; }
  .info-box {
    margin: 8px 12px; padding: 10px 14px;
    background: #EBF8FF; border: 1px solid #BEE3F8; border-radius: 8px;
    font-size: 12px; color: #2B6CB0; line-height: 1.5;
  }
  .info-box.warn { background: #FFFFF0; border-color: #F6E05E; color: #744210; }
  .empty-state { padding: 40px 20px; text-align: center; color: #A0AEC0; font-size: 14px; line-height: 1.6; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

// ═══════════════════════════════════════════════
// ESTADO Y LOCALSTORAGE
// ═══════════════════════════════════════════════
const LS_KEY = 'adrenalyn2526v2';
let state = { checked:{}, seccion:'equipos', equipoIdx:0, serieIdx:0, filtroFaltan:false, busqueda:'' };

function loadState() {
  try { const s = localStorage.getItem(LS_KEY); if(s){ const p=JSON.parse(s); state.checked=p.checked||{}; } } catch(e){}
}
function saveChecked() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({checked:state.checked})); } catch(e){}
}
function cardKey(sec, grupo, num) { return `${sec}::${grupo}::${num}`; }

function toggleCard(key) {
  state.checked[key] = !state.checked[key];
  saveChecked();
  const row = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if(row){
    row.classList.toggle('checked', !!state.checked[key]);
    if(state.filtroFaltan && state.checked[key]) row.classList.add('hidden');
    else if(state.filtroFaltan && !state.checked[key]) row.classList.remove('hidden');
  }
  updateProgress();
  updateSectionCount();
  updateSubnavCounts();
}

// ═══════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════
function setSeccion(sec) {
  state.seccion=sec; state.busqueda='';
  document.getElementById('searchInput').value='';
  document.getElementById('clearSearch').style.display='none';
  const secs=['equipos','series','entrenadores','plus','limitadas'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',secs[i]===sec));
  render();
}
function setEquipo(idx){ state.equipoIdx=idx; render(); }
function setSerie(idx){ state.serieIdx=idx; render(); }

// ═══════════════════════════════════════════════
// FILTRO FALTAN
// ═══════════════════════════════════════════════
function toggleFiltro(){
  state.filtroFaltan=!state.filtroFaltan;
  document.getElementById('filtroBtn').classList.toggle('active',state.filtroFaltan);
  applyFiltro();
}
function applyFiltro(){
  document.querySelectorAll('.card-row').forEach(row=>{
    const key=row.dataset.key; if(!key) return;
    const tenida=!!state.checked[key];
    row.classList.toggle('hidden', state.filtroFaltan && tenida);
  });
  checkEmptyState();
}
function checkEmptyState(){
  const content=document.getElementById('content');
  const visible=content.querySelectorAll('.card-row:not(.hidden)').length;
  let emp=content.querySelector('.filtro-empty');
  if(visible===0 && state.filtroFaltan){
    if(!emp){
      emp=document.createElement('div'); emp.className='empty-state filtro-empty';
      emp.innerHTML='<div class="empty-icon">🏆</div><strong>¡Sección completa!</strong><br>No te falta ninguna carta aquí.';
      content.appendChild(emp);
    }
  } else if(emp){ emp.remove(); }
}

// ═══════════════════════════════════════════════
// BÚSQUEDA
// ═══════════════════════════════════════════════
function handleSearch(q){
  state.busqueda=q.toLowerCase().trim();
  document.getElementById('clearSearch').style.display=q?'block':'none';
  if(state.busqueda) renderSearch(); else render();
}
function renderSearch(){
  const q=state.busqueda; const results=[];
  EQUIPOS.forEach(eq=>eq.cartas.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('eq',eq.nombre,c.n),n:c.n,t:c.t,sub:eq.nombre,bis:c.bis});
  }));
  SERIES.forEach(s=>s.cartas.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('se',s.nombre,c.n),n:c.n,t:c.t,sub:s.nombre});
  }));
  ENTRENADORES.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('en','ent',c.n),n:c.n,t:c.t,sub:'Entrenadores'});
  });
  PLUS.forEach((c,i)=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('pl','plus',c.n+i),n:c.n,t:c.t,sub:'Plus',bis:c.bis});
  });
  const content=document.getElementById('content');
  if(results.length===0){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div>Sin resultados para "<strong>${q}</strong>"</div>`; return;
  }
  content.innerHTML=results.map(r=>rowHTML(r.key,r.n,r.t,r.bis,r.sub)).join('');
  applyFiltro();
}

// ═══════════════════════════════════════════════
// HTML HELPERS
// ═══════════════════════════════════════════════
function rowHTML(key,num,nombre,bis,sub){
  const checked=!!state.checked[key];
  const hidden=state.filtroFaltan&&checked?'hidden':'';
  const subHtml=sub?`<span style="font-size:10px;color:#A0AEC0;margin-left:4px">(${sub})</span>`:'';
  return `<div class="card-row${bis?' bis':''}${checked?' checked':''}${hidden?' hidden':''}" data-key="${key}" onclick="toggleCard('${key.replace(/'/g,"\\'")}')">
    <div class="card-info">
      <span class="card-num">${num}</span>
      <span class="card-name">${nombre}${subHtml}</span>
    </div>
    <div class="checkbox"><span class="checkmark">✓</span></div>
  </div>`;
}

function subnavEquiposHTML(){
  return '<div class="subnav" id="subnavEq">'+
    EQUIPOS.map((eq,i)=>{
      const total=eq.cartas.length;
      const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n)]).length;
      return `<button class="subnav-btn${i===state.equipoIdx?' active':''}${done===total?' completo':''}" onclick="setEquipo(${i})">
        <span>${eq.nombre}</span><span class="btn-count">${done}/${total}</span></button>`;
    }).join('')+'</div>';
}
function subnavSeriesHTML(){
  return '<div class="subnav" id="subnavSe">'+
    SERIES.map((s,i)=>{
      const total=s.cartas.length;
      const done=s.cartas.filter(c=>!!state.checked[cardKey('se',s.nombre,c.n)]).length;
      const lbl=s.nombre.split(' ')[0];
      return `<button class="subnav-btn${i===state.serieIdx?' active':''}${done===total?' completo':''}" onclick="setSerie(${i})">
        <span style="font-size:9px">${lbl}</span><span class="btn-count">${done}/${total}</span></button>`;
    }).join('')+'</div>';
}
function secHeaderHTML(titulo,done,total){
  return `<div class="section-header"><span class="section-title">${titulo}</span><span class="section-count">${done}/${total}</span></div>`;
}

// ═══════════════════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════════════════
function render(){
  if(state.busqueda){renderSearch();return;}
  const content=document.getElementById('content');
  let html='';
  if(state.seccion==='equipos'){
    html+=subnavEquiposHTML();
    const eq=EQUIPOS[state.equipoIdx];
    const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n)]).length;
    html+=secHeaderHTML(eq.nombre,done,eq.cartas.length);
    eq.cartas.forEach(c=>{ html+=rowHTML(cardKey('eq',eq.nombre,c.n),c.n,c.t,c.bis); });
  }
  else if(state.seccion==='series'){
    html+=subnavSeriesHTML();
    const s=SERIES[state.serieIdx];
    const done=s.cartas.filter(c=>!!state.checked[cardKey('se',s.nombre,c.n)]).length;
    html+=secHeaderHTML(s.nombre,done,s.cartas.length);
    s.cartas.forEach(c=>{ html+=rowHTML(cardKey('se',s.nombre,c.n),c.n,c.t,c.bis); });
  }
  else if(state.seccion==='entrenadores'){
    const done=ENTRENADORES.filter(c=>!!state.checked[cardKey('en','ent',c.n)]).length;
    html+=secHeaderHTML('Entrenadores',done,ENTRENADORES.length);
    ENTRENADORES.forEach(c=>{ html+=rowHTML(cardKey('en','ent',c.n),c.n,c.t); });
  }
  else if(state.seccion==='plus'){
    const done=PLUS.filter((c,i)=>!!state.checked[cardKey('pl','plus',c.n+i)]).length;
    html+=secHeaderHTML('Adrenalyn Plus',done,PLUS.length);
    html+=`<div class="info-box">🔵 <strong>92 nuevas cards</strong> — Nuevos Fichajes BIS, Nuevos Guantes de Oro, Kryptonita, Diamantes, Protas, Super Cracks, Master Míster, Card Fantástica, Nuevos Balones de Oro y Autógrafos. Las cards marcadas en naranja son BIS.</div>`;
    PLUS.forEach((c,i)=>{ html+=rowHTML(cardKey('pl','plus',c.n+i),c.n,c.t,c.bis); });
  }
  else if(state.seccion==='limitadas'){
    const done=LIMITADAS.filter((c,i)=>!!state.checked[cardKey('li','lim',c.n+i)]).length;
    html+=secHeaderHTML('Cards Especiales en Sobres',done,LIMITADAS.length);
    html+=`<div class="info-box warn">⚠️ Estas cards se encuentran en sobres regulares pero <strong>no son necesarias para completar la colección</strong>. No se pueden pedir a Panini como faltas.</div>`;
    LIMITADAS.forEach((c,i)=>{ html+=rowHTML(cardKey('li','lim',c.n+i),c.n,c.t,true); });
  }
  content.innerHTML=html;
  applyFiltro();
}

// ═══════════════════════════════════════════════
// PROGRESO
// ═══════════════════════════════════════════════
function countAll(){
  let total=0,done=0;
  EQUIPOS.forEach(eq=>eq.cartas.forEach(c=>{ total++; if(state.checked[cardKey('eq',eq.nombre,c.n)]) done++; }));
  SERIES.forEach(s=>s.cartas.forEach(c=>{ total++; if(state.checked[cardKey('se',s.nombre,c.n)]) done++; }));
  ENTRENADORES.forEach(c=>{ total++; if(state.checked[cardKey('en','ent',c.n)]) done++; });
  PLUS.forEach((c,i)=>{ total++; if(state.checked[cardKey('pl','plus',c.n+i)]) done++; });
  LIMITADAS.forEach((c,i)=>{ total++; if(state.checked[cardKey('li','lim',c.n+i)]) done++; });
  return {total,done};
}
function updateProgress(){
  const {total,done}=countAll();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${total} cartas · ${pct}% completado`;
}
function updateSectionCount(){
  const h=document.querySelector('.section-header .section-count'); if(!h) return;
  const rows=document.querySelectorAll('.card-row');
  h.textContent=`${[...rows].filter(r=>r.classList.contains('checked')).length}/${rows.length}`;
}
function updateSubnavCounts(){
  if(state.seccion==='equipos'){
    EQUIPOS.forEach((eq,i)=>{
      const btn=document.querySelector(`#subnavEq .subnav-btn:nth-child(${i+1}) .btn-count`); if(!btn) return;
      const total=eq.cartas.length;
      const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n)]).length;
      btn.textContent=`${done}/${total}`;
      btn.closest('.subnav-btn').classList.toggle('completo',done===total);
    });
  }
}

// ═══════════════════════════════════════════════
// EVENTOS
// ═══════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',e=>handleSearch(e.target.value));
document.getElementById('clearSearch').addEventListener('click',()=>{ document.getElementById('searchInput').value=''; handleSearch(''); });

// INIT
loadState(); render(); updateProgress();
</script>
