  #header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--azul) 0%,var(--azul-dark) 100%);padding:12px 14px 10px;box-shadow:0 2px 12px rgba(0,0,0,.3);}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .logo{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--naranja);}
  .temporada{font-size:12px;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:1px;}
  .progress-wrap{height:7px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-bottom:5px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--naranja),#FFD700);border-radius:4px;transition:width .4s ease;}
  .progress-text{font-size:11px;color:rgba(255,255,255,.75);text-align:right;}
  #toolbar{background:white;border-bottom:1px solid #E2E8F0;padding:8px 12px;display:flex;gap:8px;align-items:center;position:sticky;top:88px;z-index:99;}
  .search-wrap{flex:1;position:relative;}
  #searchInput{width:100%;border:1.5px solid #CBD5E0;border-radius:8px;padding:8px 32px 8px 10px;font-size:14px;background:#F7FAFC;outline:none;color:#2D3748;}
  #searchInput:focus{border-color:var(--azul);}
  #clearSearch{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:14px;color:#A0AEC0;cursor:pointer;display:none;}
  #filtroBtn{display:flex;align-items:center;gap:5px;background:#EDF2F7;border:1.5px solid #CBD5E0;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:var(--azul);cursor:pointer;white-space:nowrap;transition:all .2s;-webkit-user-select:none;user-select:none;}
  #filtroBtn.active{background:var(--naranja);border-color:var(--naranja);color:white;}
  .filtro-dot{width:8px;height:8px;border-radius:50%;background:#CBD5E0;transition:background .2s;}
  #filtroBtn.active .filtro-dot{background:white;}
  #tabs{display:flex;overflow-x:auto;gap:0;background:white;border-bottom:2px solid #E2E8F0;padding:0 8px;position:sticky;top:140px;z-index:98;scrollbar-width:none;}
  #tabs::-webkit-scrollbar{display:none;}
  .tab{background:none;border:none;border-bottom:3px solid transparent;padding:9px 9px;cursor:pointer;font-size:11px;font-weight:600;color:#718096;white-space:nowrap;transition:all .15s;-webkit-user-select:none;user-select:none;}
  .tab.active{border-bottom-color:var(--naranja);color:var(--azul);}
  #content{padding-bottom:90px;}
  .subnav{display:flex;overflow-x:auto;gap:6px;padding:10px 12px;background:#EDF2F7;border-bottom:1px solid #E2E8F0;scrollbar-width:none;}
  .subnav::-webkit-scrollbar{display:none;}
  .subnav-btn{background:white;border:1.5px solid #CBD5E0;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:10px;font-weight:600;color:#4A5568;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:68px;transition:all .15s;-webkit-user-select:none;user-select:none;}
  .subnav-btn.active{background:var(--azul);border-color:var(--azul);color:white;}
  .subnav-btn .btn-count{font-size:11px;font-weight:800;}
  .subnav-btn.completo .btn-count{color:var(--verde);}
  .subnav-btn.active.completo .btn-count{color:#86EFAC;}
  .section-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 8px;background:white;border-bottom:1px solid #E2E8F0;position:sticky;top:183px;z-index:97;}
  .section-title{font-size:14px;font-weight:800;color:var(--azul);}
  .section-count{font-size:13px;font-weight:700;color:var(--naranja);}
  .card-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:var(--row-h);background:white;border-bottom:1px solid #EDF2F7;cursor:pointer;transition:background .12s;gap:10px;-webkit-user-select:none;user-select:none;}
  .card-row:active{background:#EDF2F7;}
  .card-row.checked{background:var(--checked-bg);}
  .card-row.bis{background:var(--bis-bg);border-left:3px solid var(--naranja);}
  .card-row.bis.checked{background:#F0FFF4;}
  .card-row.hidden{display:none;}
  .card-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .card-num{font-size:10px;font-weight:700;color:#A0AEC0;min-width:42px;background:#EDF2F7;border-radius:4px;padding:2px 4px;text-align:center;flex-shrink:0;}
  .card-name{font-size:13px;font-weight:500;color:#2D3748;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-row.checked .card-name{color:#68D391;text-decoration:line-through;}
  .bis-tag{font-size:9px;background:#FED7AA;color:#C05621;border-radius:3px;padding:1px 4px;flex-shrink:0;white-space:nowrap;}
  .checkbox{width:26px;height:26px;border-radius:6px;border:2px solid #CBD5E0;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .card-row.checked .checkbox{background:var(--verde);border-color:var(--verde);}
  .checkmark{color:white;font-size:14px;font-weight:900;display:none;}
  .card-row.checked .checkmark{display:block;}
  .info-box{margin:8px 12px;padding:10px 14px;background:#EBF8FF;border:1px solid #BEE3F8;border-radius:8px;font-size:12px;color:#2B6CB0;line-height:1.5;}
  .info-box.warn{background:#FFFFF0;border-color:#F6E05E;color:#744210;}
  .group-label{padding:8px 16px 4px;font-size:10px;font-weight:800;color:#A0AEC0;text-transform:uppercase;letter-spacing:1px;background:#F7FAFC;border-bottom:1px solid #EDF2F7;}
  .empty-state{padding:40px 20px;text-align:center;color:#A0AEC0;font-size:14px;line-height:1.6;}
  .empty-icon{font-size:40px;margin-bottom:12px;}
</style>

  {g:"Autógrafos Originales Premium (AO)", cartas:[

    {n:"AO50/2",t:"Álex Baena (Atlético de Madrid)"},
    {n:"AO50/3",t:"Almada (Atlético de Madrid) — Sobre Premium"},
    {n:"AO50/4",t:"Julián Álvarez (Atlético de Madrid) — Sobre Premium Oro"},
    {n:"AO50/5",t:"Lamine Yamal (FC Barcelona)"},
    {n:"AO50/6",t:"Raphinha (FC Barcelona)"},
    {n:"AO50/7",t:"Joan García (FC Barcelona) — Sobre Premium"},
    {n:"AO50/8",t:"Borja Iglesias (RC Celta)"},
    {n:"AO50/9",t:"Güler (Real Madrid)"},
    {n:"AO50/10",t:"Moleiro (Villarreal CF)"},
    {n:"AO50/11",t:"Fermín (FC Barcelona) — Adrenalyn Plus"},
    {n:"AO50/12",t:"Gerard Moreno (Villarreal CF) — Adrenalyn Plus"},
    {n:"AO100/15",t:"Aramburu (Real Sociedad) — Adrenalyn Plus"},
    {n:"AO100/16",t:"Unai López (Rayo Vallecano) — Dream Box"},
    {n:"AO200/21",t:"Guruzeta (Athletic Club) — Adrenalyn Plus"},
    {n:"AO200/22",t:"Carmona (Sevilla FC) — Adrenalyn Plus"},
    {n:"AO200/23",t:"Iñaki Peña (Elche CF) — Adrenalyn Plus"},
    {n:"AO200/24",t:"Radu (RC Celta) — Adrenalyn Plus"},
    {n:"DAO50/1",t:"Doble Autógrafo — Isco + Lo Celso (Real Betis)"},

  {g:"Autógrafos Prestige (6 cartas en sobres regulares)", cartas:[

    {n:"PRE/3",t:"Autógrafo Prestige #/100 — jugador 3"},
    {n:"PRE/4",t:"Autógrafo Prestige #/100 — jugador 4"},
    {n:"PRE/5",t:"Autógrafo Prestige #/50 — jugador 5"},
    {n:"PRE/6",t:"Autógrafo Prestige #/50 — jugador 6"}
  ]}
];

// ─── ESTADO ──────────────────────────────────────────────
const LS_KEY='adrenalyn2526v3';
let state={checked:{},seccion:'equipos',equipoIdx:0,serieIdx:0,fueraIdx:0,filtroFaltan:false,busqueda:''};

function loadState(){try{const s=localStorage.getItem(LS_KEY);if(s){const p=JSON.parse(s);state.checked=p.checked||{};}}catch(e){}}
function saveChecked(){try{localStorage.setItem(LS_KEY,JSON.stringify({checked:state.checked}));}catch(e){}}
function cardKey(sec,grupo,num){return `${sec}::${grupo}::${num}`;}

function toggleCard(key){
  state.checked[key]=!state.checked[key];saveChecked();
  const row=document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if(row){
    row.classList.toggle('checked',!!state.checked[key]);
    if(state.filtroFaltan&&state.checked[key])row.classList.add('hidden');
    else if(state.filtroFaltan&&!state.checked[key])row.classList.remove('hidden');
  }
  updateProgress();updateSectionCount();updateSubnavCounts();
}

function setSeccion(sec){
  state.seccion=sec;state.busqueda='';
  document.getElementById('searchInput').value='';
  document.getElementById('clearSearch').style.display='none';
  const secs=['equipos','series','entrenadores','plus','fuera'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',secs[i]===sec));
  render();
}
function setEquipo(idx){state.equipoIdx=idx;render();}
function setSerie(idx){state.serieIdx=idx;render();}
function setFuera(idx){state.fueraIdx=idx;render();}

function toggleFiltro(){
  state.filtroFaltan=!state.filtroFaltan;
  document.getElementById('filtroBtn').classList.toggle('active',state.filtroFaltan);
  applyFiltro();
}
function applyFiltro(){
  document.querySelectorAll('.card-row').forEach(row=>{
    const key=row.dataset.key;if(!key)return;
    row.classList.toggle('hidden',state.filtroFaltan&&!!state.checked[key]);
  });
  checkEmptyState();
}
function checkEmptyState(){
  const content=document.getElementById('content');
  const visible=content.querySelectorAll('.card-row:not(.hidden)').length;
  let emp=content.querySelector('.filtro-empty');
  if(visible===0&&state.filtroFaltan){
    if(!emp){emp=document.createElement('div');emp.className='empty-state filtro-empty';emp.innerHTML='<div class="empty-icon">🏆</div><strong>¡Sección completa!</strong><br>No te falta ninguna carta aquí.';content.appendChild(emp);}
  }else if(emp){emp.remove();}
}

function handleSearch(q){
  state.busqueda=q.toLowerCase().trim();
  document.getElementById('clearSearch').style.display=q?'block':'none';
  if(state.busqueda)renderSearch();else render();
}
function renderSearch(){
  const q=state.busqueda;const results=[];
  EQUIPOS.forEach(eq=>eq.cartas.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('eq',eq.nombre,c.n+c.t),n:c.n,t:c.t,sub:eq.nombre,bis:c.bis});
  }));
  SERIES.forEach(s=>s.cartas.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('se',s.nombre,c.n),n:c.n,t:c.t,sub:s.nombre});
  }));
  ENTRENADORES.forEach(c=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('en','ent',c.n),n:c.n,t:c.t,sub:'Entrenadores'});
  });
  PLUS.forEach((c,i)=>{
    if(c.n.toLowerCase().includes(q)||c.t.toLowerCase().includes(q))
      results.push({key:cardKey('pl','plus',c.n+i),n:c.n,t:c.t,sub:'Plus',bis:c.bis});
  });
  const content=document.getElementById('content');
  if(results.length===0){content.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div>Sin resultados para "<strong>${q}</strong>"</div>`;return;}
  content.innerHTML=results.map(r=>rowHTML(r.key,r.n,r.t,r.bis,r.sub)).join('');
  applyFiltro();
}

// ─── ORIGEN BIS ──────────────────────────────────────────
const BIS_LABELS={STD:'Stadium',BOX:'Tin Box',PKT:'Pocket Box',ACT:'Plus',SPO:'Premium Oro',SMO:'Momentum Oro'};
function bisTag(bis){
  if(!bis)return '';
  if(bis===true)return `<span class="bis-tag">PLUS</span>`;
  return `<span class="bis-tag">${BIS_LABELS[bis]||bis}</span>`;
}

function rowHTML(key,num,nombre,bis,sub){
  const checked=!!state.checked[key];
  const hidden=state.filtroFaltan&&checked?'hidden':'';
  const isBis=!!bis;
  const subHtml=sub?`<span style="font-size:10px;color:#A0AEC0;margin-left:4px">(${sub})</span>`:'';
  return `<div class="card-row${isBis?' bis':''}${checked?' checked':''}${hidden?' hidden':''}" data-key="${key}" onclick="toggleCard('${key.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
    <div class="card-info">
      <span class="card-num">${num}</span>
      <span class="card-name">${nombre}${subHtml}</span>
      ${bisTag(bis)}
    </div>
    <div class="checkbox"><span class="checkmark">✓</span></div>
  </div>`;
}

function subnavEquiposHTML(){
  return '<div class="subnav" id="subnavEq">'+
    EQUIPOS.map((eq,i)=>{
      const total=eq.cartas.length;
      const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n+c.t)]).length;
      return `<button class="subnav-btn${i===state.equipoIdx?' active':''}${done===total?' completo':''}" onclick="setEquipo(${i})">
        <span>${eq.nombre}</span><span class="btn-count">${done}/${total}</span></button>`;
    }).join('')+'</div>';
}
function subnavSeriesHTML(){
  return '<div class="subnav" id="subnavSe">'+
    SERIES.map((s,i)=>{
      const total=s.cartas.length;
      const done=s.cartas.filter(c=>!!state.checked[cardKey('se',s.nombre,c.n)]).length;
      return `<button class="subnav-btn${i===state.serieIdx?' active':''}${done===total?' completo':''}" onclick="setSerie(${i})">
        <span style="font-size:9px">${s.nombre.split(' ')[0]}</span><span class="btn-count">${done}/${total}</span></button>`;
    }).join('')+'</div>';
}
function subnavFueraHTML(){
  return '<div class="subnav" id="subnavFu">'+
    FUERA.map((g,i)=>{
      const total=g.cartas.length;
      const done=g.cartas.filter((c,j)=>!!state.checked[cardKey('fu',g.g,c.n+j)]).length;
      const lbl=g.g.split(' ')[0];
      return `<button class="subnav-btn${i===state.fueraIdx?' active':''}${done===total?' completo':''}" onclick="setFuera(${i})">
        <span style="font-size:9px">${lbl}</span><span class="btn-count">${done}/${total}</span></button>`;
    }).join('')+'</div>';
}
function secHeaderHTML(titulo,done,total){
  return `<div class="section-header"><span class="section-title">${titulo}</span><span class="section-count">${done}/${total}</span></div>`;
}

function render(){
  if(state.busqueda){renderSearch();return;}
  const content=document.getElementById('content');let html='';
  if(state.seccion==='equipos'){
    html+=subnavEquiposHTML();
    const eq=EQUIPOS[state.equipoIdx];
    const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n+c.t)]).length;
    html+=secHeaderHTML(eq.nombre,done,eq.cartas.length);
    // leyenda BIS
    const hasBis=eq.cartas.some(c=>c.bis);
    if(hasBis)html+=`<div class="info-box" style="margin:6px 12px;padding:8px 12px;font-size:11px">🟡 <strong>Naranja = carta BIS</strong> · STD=Stadium Card · Tin Box · Pocket Box · ACT=Actualización Plus · SPO=Sobre Premium Oro</div>`;
    eq.cartas.forEach(c=>{html+=rowHTML(cardKey('eq',eq.nombre,c.n+c.t),c.n,c.t,c.bis);});
  }
  else if(state.seccion==='series'){
    html+=subnavSeriesHTML();
    const s=SERIES[state.serieIdx];
    const done=s.cartas.filter(c=>!!state.checked[cardKey('se',s.nombre,c.n)]).length;
    html+=secHeaderHTML(s.nombre,done,s.cartas.length);
    s.cartas.forEach(c=>{html+=rowHTML(cardKey('se',s.nombre,c.n),c.n,c.t,false);});
  }
  else if(state.seccion==='entrenadores'){
    const done=ENTRENADORES.filter(c=>!!state.checked[cardKey('en','ent',c.n)]).length;
    html+=secHeaderHTML('Entrenadores (Adrenalyn Plus)',done,ENTRENADORES.length);
    html+=`<div class="info-box">🧢 Los 20 entrenadores se incluyen en la <strong>Actualización Plus</strong> de marzo 2026, no en los sobres regulares.</div>`;
    ENTRENADORES.forEach(c=>{html+=rowHTML(cardKey('en','ent',c.n),c.n,c.t,false);});
  }
  else if(state.seccion==='plus'){
    const done=PLUS.filter((c,i)=>!!state.checked[cardKey('pl','plus',c.n+i)]).length;
    html+=secHeaderHTML('Adrenalyn Plus (marzo 2026)',done,PLUS.length);
    html+=`<div class="info-box">🔵 <strong>92 nuevas cards</strong> en la actualización Plus. Incluye nuevas series especiales, fichajes BIS (numerados en cada equipo) y autógrafos originales.</div>`;
    PLUS.forEach((c,i)=>{html+=rowHTML(cardKey('pl','plus',c.n+i),c.n,c.t,c.bis);});
  }
  else if(state.seccion==='fuera'){
    html+=subnavFueraHTML();
    const g=FUERA[state.fueraIdx];
    const done=g.cartas.filter((c,j)=>!!state.checked[cardKey('fu',g.g,c.n+j)]).length;
    html+=secHeaderHTML(g.g.split('(')[0].trim(),done,g.cartas.length);
    html+=`<div class="info-box warn">⚠️ Estas cards están <strong>fuera de colección oficial</strong>. No son necesarias para completarla y no se pueden pedir a Panini como faltas.</div>`;
    g.cartas.forEach((c,j)=>{html+=rowHTML(cardKey('fu',g.g,c.n+j),c.n,c.t,true);});
  }
  content.innerHTML=html;applyFiltro();
}

function countAll(){
  let total=0,done=0;
  EQUIPOS.forEach(eq=>eq.cartas.forEach(c=>{total++;if(state.checked[cardKey('eq',eq.nombre,c.n+c.t)])done++;}));
  SERIES.forEach(s=>s.cartas.forEach(c=>{total++;if(state.checked[cardKey('se',s.nombre,c.n)])done++;}));
  ENTRENADORES.forEach(c=>{total++;if(state.checked[cardKey('en','ent',c.n)])done++;});
  PLUS.forEach((c,i)=>{total++;if(state.checked[cardKey('pl','plus',c.n+i)])done++;});
  FUERA.forEach(g=>g.cartas.forEach((c,j)=>{total++;if(state.checked[cardKey('fu',g.g,c.n+j)])done++;}));
  return{total,done};
}
function updateProgress(){
  const{total,done}=countAll();const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${total} cartas · ${pct}% completado`;
}
function updateSectionCount(){
  const h=document.querySelector('.section-header .section-count');if(!h)return;
  const rows=document.querySelectorAll('.card-row');
  h.textContent=`${[...rows].filter(r=>r.classList.contains('checked')).length}/${rows.length}`;
}
function updateSubnavCounts(){
  if(state.seccion==='equipos'){
    EQUIPOS.forEach((eq,i)=>{
      const btn=document.querySelector(`#subnavEq .subnav-btn:nth-child(${i+1}) .btn-count`);if(!btn)return;
      const total=eq.cartas.length;
      const done=eq.cartas.filter(c=>!!state.checked[cardKey('eq',eq.nombre,c.n+c.t)]).length;
      btn.textContent=`${done}/${total}`;
      btn.closest('.subnav-btn').classList.toggle('completo',done===total);
    });
  }
}

document.getElementById('searchInput').addEventListener('input',e=>handleSearch(e.target.value));
document.getElementById('clearSearch').addEventListener('click',()=>{document.getElementById('searchInput').value='';handleSearch('');});

loadState();render();updateProgress();
</script>
